name: Cross-platform script validation

on:
  push:
    paths:
      - 'tests/**/*.sh'
      - 'terraform/**/*.sh'
      - 'config/*.env'
      - '.shellcheckrc'
      - '.github/workflows/portability.yml'
  pull_request:
    paths:
      - 'tests/**/*.sh'
      - 'terraform/**/*.sh'
      - 'config/*.env'
      - '.shellcheckrc'
      - '.github/workflows/portability.yml'

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Bash 4+ (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install bash kubectl helm shellcheck
          echo "$(brew --prefix)/bin" >> "$GITHUB_PATH"

      - name: Show tool versions
        run: |
          echo "bash: $(bash --version | head -1)"
          echo "date: $(date --version 2>&1 | head -1 || echo 'BSD date (no --version)')"
          echo "kubectl: $(kubectl version --client -o json 2>/dev/null | jq -r '.clientVersion.gitVersion' 2>/dev/null || echo 'not installed')"
          echo "helm: $(helm version --short 2>/dev/null || echo 'not installed')"

      - name: Syntax check (bash -n)
        run: |
          status=0
          while IFS= read -r f; do
            if ! bash -n "$f" 2>&1; then
              echo "FAIL: $f"
              status=1
            fi
          done < <(find tests/ terraform/ -name '*.sh' -type f)
          exit $status

      - name: shellcheck
        run: |
          find tests/ terraform/ -name '*.sh' -type f | sort \
            | xargs shellcheck --shell=bash

      - name: '--help smoke test'
        run: |
          status=0
          while IFS= read -r f; do
            if grep -q '\-\-help' "$f"; then
              echo "--- $f --help ---"
              if ! bash "$f" --help >/dev/null 2>&1; then
                echo "FAIL: $f --help exited non-zero"
                status=1
              fi
            fi
          done < <(find tests/ terraform/ -name '0*.sh' -type f | sort)
          exit $status

      - name: '--dry-run smoke test'
        run: |
          status=0
          # Discover scripts annotated with "# ci-dry-run: [extra-args]".
          # New scripts opt in by adding that comment before `set -euo pipefail`.
          while IFS= read -r f; do
            args=$(grep -m1 '^# ci-dry-run:' "$f" | sed 's/^# ci-dry-run://')
            echo "--- $f --dry-run ${args:-(no extra args)} ---"
            # Word-split $args intentionally — each token is a separate CLI arg.
            # shellcheck disable=SC2086
            if ! bash "$f" --dry-run $args 2>&1; then
              echo "FAIL: $f --dry-run exited non-zero"
              status=1
            fi
          done < <(grep -rl '^# ci-dry-run:' tests/ terraform/ --include='*.sh' | sort)
          exit $status

      - name: Dry-run annotation enforcement
        run: |
          status=0
          while IFS= read -r f; do
            if ! grep -q '^# ci-dry-run:\|^# ci-dry-run-skip:' "$f"; then
              echo "FAIL: $f mentions --dry-run but has no ci-dry-run annotation"
              status=1
            fi
          done < <(grep -rl '\-\-dry-run' tests/ terraform/ --include='0*.sh' | sort)
          if ((status == 0)); then echo "PASS — all --dry-run scripts are annotated"; fi
          exit $status

      - name: Portable timestamp helpers
        run: |
          # Robust extraction: match functions by name, not position.
          EXTRACT_AWK='
          /^NOW_MS_IMPL=/ || /^NOW_NS_IMPL=/ { print; next }
          /^_detect_now_(ms|ns)\(\)/ { fn=1 }
          /^now_(ms|ns)\(\)/          { fn=1 }
          fn { print; if (/^}$/) fn=0 }
          '

          # Test the sourced library (timestamp.sh).
          echo "=== timestamp.sh (tests/lib) ==="
          (
            set -euo pipefail
            die() { echo "error: $*" >&2; exit 1; }
            source tests/lib/timestamp.sh
            ns=$(now_ns); ms=$(now_ms)
            echo "now_ns=$ns  now_ms=$ms"
            [[ "$ns" =~ ^[0-9]+$ ]] || { echo "FAIL: now_ns not numeric"; exit 1; }
            [[ "$ms" =~ ^[0-9]+$ ]] || { echo "FAIL: now_ms not numeric"; exit 1; }
            (( ${#ns} >= 19 )) || { echo "FAIL: now_ns too short (${#ns} digits)"; exit 1; }
            (( ${#ms} >= 13 )) || { echo "FAIL: now_ms too short (${#ms} digits)"; exit 1; }
            echo "PASS"
          )

          # Dynamically discover and test standalone implementations.
          status=0
          while IFS= read -r f; do
            echo ""
            echo "=== $f ==="
            (
              set -euo pipefail
              die() { echo "error: $*" >&2; exit 1; }
              eval "$(awk "$EXTRACT_AWK" "$f")"
              if type now_ns &>/dev/null; then
                ns=$(now_ns)
                echo "now_ns=$ns"
                [[ "$ns" =~ ^[0-9]+$ ]] || { echo "FAIL: now_ns not numeric"; exit 1; }
                (( ${#ns} >= 19 )) || { echo "FAIL: now_ns too short (${#ns} digits)"; exit 1; }
              fi
              if type now_ms &>/dev/null; then
                ms=$(now_ms)
                echo "now_ms=$ms"
                [[ "$ms" =~ ^[0-9]+$ ]] || { echo "FAIL: now_ms not numeric"; exit 1; }
                (( ${#ms} >= 13 )) || { echo "FAIL: now_ms too short (${#ms} digits)"; exit 1; }
              fi
              echo "PASS"
            ) || status=1
          done < <(grep -rl '^NOW_NS_IMPL=\|^NOW_MS_IMPL=' tests/ --include='*.sh' | sort)
          exit $status

      - name: Portable base64 (no -w flag)
        run: |
          encoded=$(echo -n "hello world" | base64 | tr -d '\n')
          echo "encoded=$encoded"
          [[ "$encoded" == *$'\n'* ]] && { echo "FAIL: newline in output"; exit 1; }
          decoded=$(echo "$encoded" | base64 -d 2>/dev/null || echo "$encoded" | base64 -D 2>/dev/null)
          [[ "$decoded" == "hello world" ]] || { echo "FAIL: round-trip mismatch"; exit 1; }
          echo "PASS"

      - name: No incompatible patterns outside helpers
        run: |
          status=0

          echo "--- Checking for raw date +%s%N outside detection code ---"
          if grep -rn 'date +%s%N\|date +%s%3N' tests/ terraform/ --include='*.sh' \
              | grep -v '_detect_now_\|NOW_NS_IMPL\|NOW_MS_IMPL\|now_ns\|now_ms\|gdate' \
              | grep -v ':[0-9]*:[[:space:]]*#'; then
            echo "FAIL: found raw date %N usage outside portable helpers"
            status=1
          else
            echo "PASS"
          fi

          echo "--- Checking for mktemp -p ---"
          if grep -rn 'mktemp -p ' tests/ terraform/ --include='*.sh' \
              | grep -v ':[0-9]*:[[:space:]]*#'; then
            echo "FAIL: found mktemp -p (GNU-only)"
            status=1
          else
            echo "PASS"
          fi

          echo "--- Checking for base64 -w ---"
          if grep -rn 'base64 -w' tests/ terraform/ --include='*.sh' \
              | grep -v ':[0-9]*:[[:space:]]*#'; then
            echo "FAIL: found base64 -w (GNU-only)"
            status=1
          else
            echo "PASS"
          fi

          echo "--- Checking for sed -i (GNU vs BSD incompatibility) ---"
          if grep -rn "sed -i " tests/ terraform/ --include='*.sh' \
              | grep -v ':[0-9]*:[[:space:]]*#'; then
            echo "FAIL: found sed -i (use sed -i '' on BSD or avoid in-place)"
            status=1
          else
            echo "PASS"
          fi

          echo "--- Checking for readlink -f (GNU-only) ---"
          if grep -rn 'readlink -f' tests/ terraform/ --include='*.sh' \
              | grep -v ':[0-9]*:[[:space:]]*#'; then
            echo "FAIL: found readlink -f (use realpath or cd/pwd instead)"
            status=1
          else
            echo "PASS"
          fi

          echo "--- Checking for grep -P (GNU-only Perl regex) ---"
          if grep -rn 'grep -[a-zA-Z]*P' tests/ terraform/ --include='*.sh' \
              | grep -v ':[0-9]*:[[:space:]]*#'; then
            echo "FAIL: found grep -P (use grep -E for extended regex)"
            status=1
          else
            echo "PASS"
          fi

          echo "--- Checking for gawk-only asorti() ---"
          if grep -rn 'asorti(' tests/ terraform/ --include='*.sh' \
              | grep -v ':[0-9]*:[[:space:]]*#'; then
            echo "FAIL: found asorti() (gawk-only; use portable insertion sort)"
            status=1
          else
            echo "PASS"
          fi

          exit $status
