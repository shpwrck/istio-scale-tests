clusterName: ""

namespace: propagation-test

watcher:
  image:
    repository: busybox
    tag: stable
  replicaCount: 1

# Pre-warmed backer (O1). A single already-Ready http-echo pod with its sidecar
# up and image pre-pulled. The Service does NOT select it until the probe stamps
# the active-flip label onto the pod at t0, so propagation (P3) measures only the
# config push for an existing, healthy endpoint — never pod scheduling/image
# pull/sidecar startup.
#
#   enabled  — render the backer Deployment + Service (set true in 001-setup).
#   active   — render the pod template WITH the active-flip label already set.
#              Off by default (Ready-but-not-selected). The probe drives the flip
#              at runtime via `kubectl label pod`; `active=true` is only for
#              `helm template` smoke tests / dry-run rendering.
backer:
  enabled: false
  active: false
  image:
    repository: hashicorp/http-echo
    # Pinned tag (was :latest). imagePullPolicy IfNotPresent so the image is pulled
    # once during 001-setup warm-up and never re-pulled at t0.
    # Keep in sync with HTTP_ECHO_VERSION in config/versions.env. "1.0" is a real,
    # pullable hashicorp/http-echo tag (verified against the registry); do not change
    # to 1.0.0 without re-checking — the bare "1.0" is the one this chart pins.
    tag: "1.0"
    pullPolicy: IfNotPresent
  runId: ""

service:
  port: 8080
