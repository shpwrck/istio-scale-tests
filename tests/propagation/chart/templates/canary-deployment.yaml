{{- if .Values.canary.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: propagation-canary
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "propagation-test.canary.labels" . | nindent 4 }}
    {{- if .Values.canary.runId }}
    propagation-run-id: {{ .Values.canary.runId | quote }}
    {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "propagation-test.canary.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "propagation-test.canary.labels" . | nindent 8 }}
        sidecar.istio.io/inject: "true"
        {{- if .Values.canary.runId }}
        propagation-run-id: {{ .Values.canary.runId | quote }}
        {{- end }}
    spec:
      containers:
        - name: http-echo
          image: {{ .Values.canary.image.repository }}:{{ .Values.canary.image.tag }}
          args:
            - -listen=:{{ .Values.service.port }}
            - -text={{ .Values.clusterName }}
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
{{- end }}
