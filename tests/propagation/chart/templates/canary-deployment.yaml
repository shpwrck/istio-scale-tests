{{- if .Values.backer.enabled }}
# Pre-warmed backer Deployment (O1). Created Ready in 001-setup with its sidecar
# up and image pre-pulled; NOT selected by the Service until the active-flip label
# is stamped on the running pod at t0. The probe flips the label rather than
# creating a fresh workload, so P3 isolates xDS/EDS propagation from pod boot.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: propagation-canary
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "propagation-test.canary.labels" . | nindent 4 }}
    {{- if .Values.backer.runId }}
    propagation-run-id: {{ .Values.backer.runId | quote }}
    {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "propagation-test.canary.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "propagation-test.canary.labels" . | nindent 8 }}
        sidecar.istio.io/inject: "true"
        {{- if .Values.backer.active }}
        {{- include "propagation-test.canary.activeSelectorLabels" . | nindent 8 }}
        {{- end }}
        {{- if .Values.backer.runId }}
        propagation-run-id: {{ .Values.backer.runId | quote }}
        {{- end }}
    spec:
      containers:
        - name: http-echo
          image: {{ .Values.backer.image.repository }}:{{ .Values.backer.image.tag }}
          imagePullPolicy: {{ .Values.backer.image.pullPolicy }}
          args:
            - -listen=:{{ .Values.service.port }}
            - -text={{ .Values.clusterName }}
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          readinessProbe:
            # The backer must be genuinely Ready before t0 so the label flip is a
            # pure config push (no pod boot in P3's window).
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
{{- end }}
