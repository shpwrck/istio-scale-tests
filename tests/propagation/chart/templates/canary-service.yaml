{{- if .Values.backer.enabled }}
# The canary Service (O1) selects on BOTH the stable backer selectorLabels AND the
# active-flip label, so it has ZERO endpoints until the probe stamps the active
# label onto the backer pod at t0 — and drains the instant the label is removed.
# It is created once in 001-setup and persists across probe iterations.
apiVersion: v1
kind: Service
metadata:
  name: propagation-canary
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "propagation-test.canary.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "propagation-test.canary.selectorLabels" . | nindent 4 }}
    {{- include "propagation-test.canary.activeSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      protocol: TCP
      targetPort: {{ .Values.service.port }}
{{- end }}
