# Profile: ebpf-interception
# Tier: 4 (architectural comparison)
#
# ┌─────────────────────────────────────────────────────────────────────────┐
# │ OSSM Support: NOT SUPPORTED — EXTERNAL PROJECT                        │
# │                                                                       │
# │ Merbridge is an independent open-source project (merbridge.io) that   │
# │ is NOT part of Red Hat OpenShift Service Mesh. It is not packaged,    │
# │ tested, or supported by Red Hat. Using it on OSSM is unsupported.     │
# │                                                                       │
# │ This profile is included for REFERENCE AND FUTURE PLANNING ONLY.      │
# └─────────────────────────────────────────────────────────────────────────┘
#
# Merbridge uses eBPF to replace iptables-based traffic interception for
# sidecar proxies. It eliminates 2 of 4 iptables traversals per cross-host
# call and can bypass the TCP/IP stack entirely for same-node communication.
#
# Expected impact (from Intel and upstream benchmarks):
#   - 11-17% latency reduction
#   - Eliminates iptables conntrack overhead
#   - Same-node calls bypass TCP/IP stack entirely
#
# Requirements:
#   - Linux kernel >= 5.7
#   - Merbridge DaemonSet deployed separately
#   - Not compatible with OSSM's istio-cni (different interception model)
#
# Relevant test suites: dataplane (if Merbridge can be deployed)
#
# References:
#   https://merbridge.io/docs/overview/
#   https://istio.io/latest/blog/2022/merbridge/
#   https://www.intel.com/content/www/us/en/developer/articles/technical/a-snapshot-of-contributions-to-istio.html

ossm_support: not-supported
ossm_support_detail: >-
  Merbridge is an external open-source project not included in or supported
  by Red Hat OpenShift Service Mesh. It requires separate deployment and is
  not compatible with OSSM's istio-cni-based traffic interception. RHEL
  CoreOS kernel on OCP typically meets the kernel >= 5.7 requirement, but
  SELinux policy and node-level eBPF restrictions may require additional
  configuration.

description: >-
  REFERENCE ONLY — eBPF-based traffic interception via Merbridge. Replaces
  iptables with eBPF programs for lower-latency sidecar interception.
  Not supported on OSSM.

# This profile cannot be applied via Istio CR patches. It requires deploying
# the Merbridge DaemonSet as a separate component.
istio_cr_patch: {}

resources: []

# Manual steps required:
#   1. Deploy Merbridge DaemonSet (helm install merbridge merbridge/merbridge)
#   2. Verify eBPF programs are loaded (bpftool prog list)
#   3. Confirm iptables rules are bypassed for mesh traffic
#   4. Run dataplane latency tests to measure improvement
