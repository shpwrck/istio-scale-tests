clusterName: ""

# Namespace naming.
#
# Backwards-compat rule:
#   - When namespaceCount == 1, the single namespace is named exactly
#     `namespace` (e.g. `controlplane-test`). This matches the
#     pre-multi-namespace layout so existing runs and tooling keep working.
#   - When namespaceCount > 1, namespaces are named
#     `${namespace}-1`, `${namespace}-2`, ..., `${namespace}-${namespaceCount-1}`.
#
# `namespacePrefix` is retained as an alias that takes precedence over
# `namespace` to keep older `--set namespacePrefix=...` invocations working.
namespace: controlplane-test
namespacePrefix: ""
namespaceCount: 1

# Number of dummy Deployments + Services to create across the namespaces.
# Service `i` is placed in namespace `i mod namespaceCount`, so services are
# distributed deterministically and evenly (modulo remainders). Service names
# stay `dummy-svc-<i>` regardless of namespace placement so a service can be
# located by its global index.
serviceCount: 10

replicasPerService: 3

# Sidecar CR scoping mode. One of:
#   none      - emit no Sidecar resources; proxies see every Service in the mesh.
#   namespace - one namespace-scoped Sidecar per workload namespace (no
#               workloadSelector); egress is restricted to the workload
#               namespace, istio-system, and ./* in-namespace traffic.
#   explicit  - one Sidecar per Deployment with workloadSelector.labels.app
#               matching `dummy-svc-<i>`; maximum scoping precision.
sidecarScoping: none

# Extra egress hosts appended to every Sidecar CR emitted by this chart.
# Defaults to a no-op empty list; operators can extend if their workloads
# need to reach additional namespaces (e.g. `monitoring/*`).
sidecarExtraEgressHosts: []

image:
  repository: busybox
  tag: stable

service:
  port: 8080
