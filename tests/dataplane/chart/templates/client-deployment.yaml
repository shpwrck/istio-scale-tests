{{- if or (eq .Values.role "client") (eq .Values.role "both") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataplane-client
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dataplane-test.client.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "dataplane-test.client.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "dataplane-test.client.labels" . | nindent 8 }}
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: fortio
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          # fortio is invoked in server mode here so the pod stays alive
          # for `kubectl exec ... fortio load`. The client Deployment exists
          # purely as an exec target; outbound traffic is sourced by
          # `fortio load` runs from the test harness.
          args: ["server", "-http-port", "8090", "-redirect-port", "-1"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
{{- end }}
