{{- if .Values.rbac.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-%s-argocd-sync" .Release.Namespace .Release.Name | trunc 63 | trimSuffix "-" | quote }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-%s-argocd-sync" .Release.Namespace .Release.Name | trunc 63 | trimSuffix "-" | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-%s-argocd-sync" .Release.Namespace .Release.Name | trunc 63 | trimSuffix "-" | quote }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.rbac.argocd.serviceAccountName | quote }}
    namespace: {{ .Values.rbac.argocd.namespace | quote }}
{{- end }}
