apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spoke-mesh-restart
  namespace: istio-system
  {{- if .Values.argoSyncWaves.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoSyncWaves.rbac | quote }}
  {{- end }}
  labels:
    {{- include "spoke-mesh-restart.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spoke-mesh-restart
  namespace: istio-system
  {{- if .Values.argoSyncWaves.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoSyncWaves.rbac | quote }}
  {{- end }}
  labels:
    {{- include "spoke-mesh-restart.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spoke-mesh-restart
subjects:
  - kind: ServiceAccount
    name: spoke-mesh-restart
    namespace: istio-system
