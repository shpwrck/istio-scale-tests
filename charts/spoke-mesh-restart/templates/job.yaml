apiVersion: batch/v1
kind: Job
metadata:
  name: spoke-mesh-restart-{{ now | date "20060102-150405" }}
  namespace: istio-system
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    {{- include "spoke-mesh-restart.labels" . | nindent 4 }}
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spoke-mesh-restart
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: spoke-mesh-restart
      restartPolicy: Never
      containers:
        - name: restart
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              {{- range .Values.deployments }}
              if oc get deployment {{ . }} -n istio-system >/dev/null 2>&1; then
                echo "Restarting {{ . }}..."
                oc rollout restart deployment/{{ . }} -n istio-system
                oc rollout status deployment/{{ . }} -n istio-system --timeout={{ $.Values.rolloutTimeout }}
              else
                echo "Deployment {{ . }} not found, skipping."
              fi
              {{- end }}
              echo "Mesh restart complete."
