# ManagedCluster name (PlacementDecision status.decisions[].clusterName) — must match [a-z0-9]([-a-z0-9]*[a-z0-9])? style names safe for Kubernetes metadata.
clusterName: ""

# Namespace for the Certificate and issued Secret (cert-manager operand namespace on the hub).
namespace: cert-manager

# Must match hub-mesh-ca root CA ClusterIssuer (.Values.rootCA.clusterIssuerName there).
rootClusterIssuerName: mesh-root-ca

certificate:
  commonName: ""
  duration: 8760h
  privateKey:
    algorithm: ECDSA
    size: 256

argoSyncWaves:
  enabled: true
  rbac: -20
  wave: 3

# Allow OpenShift GitOps application-controller to reconcile Certificate / Secret in namespace (needed when synced via ApplicationSet without hub-mesh-ca RBAC hooks).
rbac:
  enabled: true
  argocd:
    namespace: openshift-gitops
    serviceAccountName: openshift-gitops-argocd-application-controller
  labels: {}
  annotations: {}
