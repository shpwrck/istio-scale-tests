# Operand / OLM namespace for the Red Hat External Secrets operator Subscription.
namespace: external-secrets-operator

# Grant OpenShift GitOps application-controller permission to reconcile OLM objects in namespace (needed for hub in-cluster Applications and permissive setups).
argoSyncWaves:
  enabled: true
  rbac: -20
  externalSecretsConfig: "5"

rbac:
  enabled: true
  argocd:
    namespace: openshift-gitops
    serviceAccountName: openshift-gitops-argocd-application-controller
  labels: {}
  annotations: {}

operatorGroup:
  name: openshift-external-secrets-operator

externalSecretsConfig:
  enabled: true

subscription:
  name: openshift-external-secrets-operator
  channel: stable-v1
  package: openshift-external-secrets-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  installPlanApproval: Automatic
