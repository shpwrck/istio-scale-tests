# Namespace for Argo CD CR, Placement, GitOpsCluster, and ManagedClusterSetBinding (e.g. openshift-gitops).
gitopsNamespace: openshift-gitops

# ManagedClusterSet name + Binding + Placement.clusterSets; must match cluster.open-cluster-management.io/clusterset on spokes (001).
clusterSet: istio-scale-tests

managedClusterSet:
  create: true

managedClusterSetBinding:
  # metadata.name defaults to clusterSet when empty.
  name: ""

placement:
  name: acm-openshift-gitops-placement
  # Exclude the ACM hub (“first” cluster): RHACM labels only the hub ManagedCluster with local-cluster=true.
  excludeHubLocalClusterLabel: true

# Shared duck-type ConfigMap for Argo CD ApplicationSet clusterDecisionResource (charts/gitops-hub-*-appset).
# Uses the same Placement / PlacementDecision as placement.name above (OCM names decisions "<name>-decision-1" by default).
argocdPlacementDecisionGenerator:
  create: true
  configMapName: acm-gitops-placement-generator

gitopsCluster:
  name: acm-openshift-gitops

argoServer:
  # Hub ManagedCluster name — MultiClusterHub spec.localClusterName (required).
  cluster: ""

gitopsAddon:
  enabled: true
