# Preset: istio-system and istio-cni namespaces on every ManagedCluster (destination.clusterName).
applicationSetNamespace: openshift-gitops
applicationSetControllerNamespace: openshift-gitops

identity:
  component: spoke-istio-namespaces

placement:
  name: acm-openshift-gitops-placement
  placementDecisionName: ""

inClusterGenerator:
  enabled: false

generatorConfigMap:
  create: false
  name: acm-gitops-placement-generator

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-spoke-istio-namespaces
  roleBindingName: openshift-gitops-ocm-placement-spoke-istio-namespaces
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

argocdApplicationControllerRbac:
  create: true
  roleName: gitops-spoke-istio-namespaces-appset-argocd-sync
  roleBindingName: gitops-spoke-istio-namespaces-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: spoke-istio-namespaces

destination:
  mode: clusterName
  namespace: default

template:
  applicationNameSuffix: istio-namespaces
  source:
    path: charts/spoke-istio-namespaces
    helm:
      releaseName: spoke-istio-namespaces

repo:
  url: ""
  revision: main
