# Preset: Istio + IstioCNI CRs on every ManagedCluster (destination.clusterName).
applicationSetNamespace: openshift-gitops
applicationSetControllerNamespace: openshift-gitops

identity:
  component: spoke-istio

placement:
  name: acm-openshift-gitops-placement
  placementDecisionName: ""

inClusterGenerator:
  enabled: false

generatorConfigMap:
  create: false
  name: acm-gitops-placement-generator

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-spoke-istio
  roleBindingName: openshift-gitops-ocm-placement-spoke-istio
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

argocdApplicationControllerRbac:
  create: true
  roleName: gitops-spoke-istio-appset-argocd-sync
  roleBindingName: gitops-spoke-istio-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: spoke-istio

destination:
  mode: clusterName
  namespace: istio-system

template:
  applicationNameSuffix: istio
  source:
    path: charts/spoke-istio
    helm:
      releaseName: spoke-istio
      parameters:
        - name: clusterName
          value: "{{clusterName}}"

repo:
  url: ""
  revision: main
