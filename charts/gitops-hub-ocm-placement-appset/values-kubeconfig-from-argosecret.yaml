# Preset: hub-only kubeconfig Secrets built from ACM Argo cluster secrets via External Secrets (destination.inClusterServer).

applicationSetNamespace: openshift-gitops
applicationSetControllerNamespace: openshift-gitops

identity:
  component: hub-kubeconfig-from-argosecret

placement:
  name: acm-openshift-gitops-placement
  placementDecisionName: ""

inClusterGenerator:
  enabled: false

generatorConfigMap:
  create: false
  name: acm-gitops-placement-generator

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-hub-kubeconfig
  roleBindingName: openshift-gitops-ocm-placement-hub-kubeconfig
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

argocdApplicationControllerRbac:
  create: true
  roleName: gitops-hub-kubeconfig-from-argosecret-appset-argocd-sync
  roleBindingName: gitops-hub-kubeconfig-from-argosecret-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: hub-kubeconfig-from-argosecret

destination:
  mode: inClusterServer
  # Align with hub-kubeconfig-from-argosecret chart default namespace (ESO operand watches this ns).
  namespace: external-secrets-operator

template:
  applicationNameSuffix: hub-kubeconfig-from-argosecret
  source:
    path: charts/hub-kubeconfig-from-argosecret
    helm:
      parameters:
        - name: managedServiceAccountName
          value: argocd-gitops
        - name: spokeSecretStore.authType
          value: cert

repo:
  url: ""
  revision: main
