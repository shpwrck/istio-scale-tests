# Preset: mesh verification echo workload on every ManagedCluster (destination.clusterName).
applicationSetNamespace: openshift-gitops
applicationSetControllerNamespace: openshift-gitops

identity:
  component: mesh-verify

placement:
  name: acm-openshift-gitops-placement
  placementDecisionName: ""

inClusterGenerator:
  enabled: false

generatorConfigMap:
  create: false
  name: acm-gitops-placement-generator

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-mesh-verify
  roleBindingName: openshift-gitops-ocm-placement-mesh-verify
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

argocdApplicationControllerRbac:
  create: true
  roleName: gitops-mesh-verify-appset-argocd-sync
  roleBindingName: gitops-mesh-verify-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: mesh-verify

destination:
  mode: clusterName
  namespace: mesh-verify

template:
  applicationNameSuffix: mesh-verify
  source:
    path: charts/mesh-verify
    helm:
      releaseName: mesh-verify
      parameters:
        - name: clusterName
          value: "{{clusterName}}"

repo:
  url: ""
  revision: main
