# Preset: mesh restart Job on every ManagedCluster (destination.clusterName).
applicationSetNamespace: openshift-gitops
applicationSetControllerNamespace: openshift-gitops

identity:
  component: spoke-mesh-restart

placement:
  name: acm-openshift-gitops-placement
  placementDecisionName: ""

inClusterGenerator:
  enabled: false

generatorConfigMap:
  create: false
  name: acm-gitops-placement-generator

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-spoke-mesh-restart
  roleBindingName: openshift-gitops-ocm-placement-spoke-mesh-restart
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

argocdApplicationControllerRbac:
  create: true
  roleName: gitops-spoke-mesh-restart-appset-argocd-sync
  roleBindingName: gitops-spoke-mesh-restart-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: spoke-mesh-restart

destination:
  mode: clusterName
  namespace: istio-system

template:
  applicationNameSuffix: mesh-restart
  source:
    path: charts/spoke-mesh-restart
    helm:
      releaseName: spoke-mesh-restart

repo:
  url: ""
  revision: main
