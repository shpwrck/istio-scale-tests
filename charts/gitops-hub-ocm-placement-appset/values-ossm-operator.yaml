# Preset: OSSM 3 (Sail) operator + Istio namespaces on every ManagedCluster (destination.clusterName).
applicationSetNamespace: openshift-gitops
applicationSetControllerNamespace: openshift-gitops

identity:
  component: spoke-ossm-operator

placement:
  name: acm-openshift-gitops-placement
  placementDecisionName: ""

inClusterGenerator:
  enabled: false

generatorConfigMap:
  create: false
  name: acm-gitops-placement-generator

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-spoke-ossm
  roleBindingName: openshift-gitops-ocm-placement-spoke-ossm
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

argocdApplicationControllerRbac:
  create: true
  roleName: gitops-spoke-ossm-operator-appset-argocd-sync
  roleBindingName: gitops-spoke-ossm-operator-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: spoke-ossm-operator

destination:
  mode: clusterName
  namespace: openshift-operators

template:
  applicationNameSuffix: ossm-operator
  source:
    path: charts/spoke-ossm-operator
    helm:
      releaseName: spoke-ossm-operator

repo:
  url: ""
  revision: main
