{{- $pn := .Values.placement.name | default "acm-openshift-gitops-placement" }}
{{- $pdec := .Values.placement.placementDecisionName | default (printf "%s-decision-1" $pn) }}
{{- $mode := required "destination.mode must be clusterName or inClusterServer" .Values.destination.mode }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.applicationSet.name | quote }}
  namespace: {{ .Values.applicationSetNamespace | quote }}
  labels:
{{- include "gitops-hub-ocm-placement-appset.labels" . | nindent 4 }}
spec:
  generators:
    - clusterDecisionResource:
        configMapRef: {{ .Values.generatorConfigMap.name | quote }}
        name: {{ $pdec | quote }}
        requeueAfterSeconds: {{ .Values.clusterDecisionResource.requeueAfterSeconds }}
{{- $hubOn := .Values.inClusterGenerator.enabled | default true }}
{{- if or (eq $hubOn true) (eq ($hubOn | toString) "true") }}
    # Static hub entry — Placement omits the hub (RHACM ManagedCluster label local-cluster=true); spokes come from clusterDecisionResource above.
    - list:
        elements:
          - clusterName: {{ .Values.inClusterGenerator.clusterName | quote }}
{{- end }}
  template:
    metadata:
      name: '{{ "{{clusterName}}" }}-{{ .Values.template.applicationNameSuffix }}'
    spec:
      project: default
      source:
        repoURL: {{ required "repo.url must be set (same Git URL Argo uses for this repo)" .Values.repo.url | quote }}
        targetRevision: {{ .Values.repo.revision | quote }}
        path: {{ .Values.template.source.path | quote }}
{{- $helm := .Values.template.source.helm }}
{{- if or $helm.releaseName $helm.parameters }}
        helm:
{{- if $helm.releaseName }}
          releaseName: {{ $helm.releaseName | quote }}
{{- end }}
{{- if $helm.parameters }}
          parameters:
{{- range $helm.parameters }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
{{- end }}
{{- end }}
{{- end }}
      destination:
{{- if eq $mode "clusterName" }}
        name: '{{ "{{clusterName}}" }}'
        namespace: {{ .Values.destination.namespace | quote }}
{{- else if eq $mode "inClusterServer" }}
        server: https://kubernetes.default.svc
        namespace: {{ .Values.destination.namespace | quote }}
{{- else }}
{{- fail "destination.mode must be clusterName (sync to every registered cluster by name) or inClusterServer (hub Kubernetes API only)" }}
{{- end }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
