{{- $pn := .Values.placement.name | default "acm-openshift-gitops-placement" }}
{{- $pdec := .Values.placement.placementDecisionName | default "" }}
{{- $mode := required "destination.mode must be clusterName or inClusterServer" .Values.destination.mode }}
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: {{ .Values.applicationSet.name | quote }}
  namespace: {{ .Values.applicationSetNamespace | quote }}
  labels:
{{- include "gitops-hub-ocm-placement-appset.labels" . | nindent 4 }}
spec:
  generators:
{{- $cdrOn := ternary .Values.clusterDecisionResource.enabled true (hasKey .Values.clusterDecisionResource "enabled") }}
{{- if or (eq $cdrOn true) (eq ($cdrOn | toString) "true") }}
    - clusterDecisionResource:
        configMapRef: {{ .Values.generatorConfigMap.name | quote }}
{{- if $pdec }}
        name: {{ $pdec | quote }}
{{- else }}
        labelSelector:
{{- $selector := .Values.clusterDecisionResource.labelSelector | default dict }}
{{- if $selector }}
{{- toYaml $selector | nindent 10 }}
{{- else }}
          matchLabels:
            cluster.open-cluster-management.io/placement: {{ $pn | quote }}
{{- end }}
{{- end }}
        requeueAfterSeconds: {{ .Values.clusterDecisionResource.requeueAfterSeconds }}
{{- end }}
{{- $hubOn := .Values.inClusterGenerator.enabled }}
{{- if or (eq $hubOn true) (eq ($hubOn | toString) "true") }}
    - list:
        elements:
{{- if .Values.inClusterGenerator.clusters }}
{{- range .Values.inClusterGenerator.clusters }}
          - clusterName: {{ . | quote }}
{{- if eq $mode "inClusterServer" }}
            server: ""
{{- end }}
{{- end }}
{{- else }}
          - clusterName: {{ .Values.inClusterGenerator.clusterName | quote }}
{{- if eq $mode "inClusterServer" }}
            server: ""
{{- end }}
{{- end }}
{{- end }}
  template:
    metadata:
      name: '{{ "{{clusterName}}" }}-{{ .Values.template.applicationNameSuffix }}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: {{ required "repo.url must be set (same Git URL Argo uses for this repo)" .Values.repo.url | quote }}
        targetRevision: {{ .Values.repo.revision | quote }}
        path: {{ .Values.template.source.path | quote }}
{{- $helm := .Values.template.source.helm | default dict }}
{{- if or (and (eq $mode "clusterName") $helm.releaseName) (eq $mode "inClusterServer") ($helm.parameters) }}
        helm:
{{- if and (eq $mode "clusterName") $helm.releaseName }}
          releaseName: {{ $helm.releaseName | quote }}
{{- end }}
{{- if eq $mode "inClusterServer" }}
          parameters:
            - name: clusterName
              value: '{{ "{{clusterName}}" }}'
            - name: clusterServer
              value: '{{ "{{server}}" }}'
{{- range ($helm.parameters | default list) }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
{{- end }}
{{- else if $helm.parameters }}
          parameters:
{{- range $helm.parameters }}
            - name: {{ .name | quote }}
              value: {{ .value | quote }}
{{- end }}
{{- end }}
{{- end }}
      destination:
{{- if eq $mode "clusterName" }}
        name: '{{ "{{clusterName}}" }}'
        namespace: {{ .Values.destination.namespace | quote }}
{{- else if eq $mode "inClusterServer" }}
        server: https://kubernetes.default.svc
        namespace: {{ .Values.destination.namespace | quote }}
{{- else }}
{{- fail "destination.mode must be clusterName (sync to every registered cluster by name) or inClusterServer (hub Kubernetes API only)" }}
{{- end }}
{{- if .Values.template.ignoreDifferences }}
      ignoreDifferences:
{{- toYaml .Values.template.ignoreDifferences | nindent 8 }}
{{- end }}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        retry:
          limit: 10
          backoff:
            duration: 15s
            maxDuration: 5m
            factor: 2
