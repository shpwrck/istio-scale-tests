# Preset: push cacerts + kubeconfig to spoke istio-system via External Secrets (destination.inClusterServer).
applicationSetNamespace: openshift-gitops
applicationSetControllerNamespace: openshift-gitops

identity:
  component: hub-mesh-push-secrets

placement:
  name: acm-openshift-gitops-placement
  placementDecisionName: ""

inClusterGenerator:
  enabled: false

generatorConfigMap:
  create: false
  name: acm-gitops-placement-generator

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-hub-mesh-push
  roleBindingName: openshift-gitops-ocm-placement-hub-mesh-push
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

argocdApplicationControllerRbac:
  create: true
  roleName: gitops-hub-mesh-push-secrets-appset-argocd-sync
  roleBindingName: gitops-hub-mesh-push-secrets-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: hub-mesh-push-secrets

destination:
  mode: inClusterServer
  namespace: external-secrets-operator

template:
  applicationNameSuffix: hub-mesh-push-secrets
  source:
    path: charts/hub-mesh-push-secrets
    helm:
      parameters:
        - name: spokeSecretStore.authType
          value: cert

repo:
  url: ""
  revision: main
