# Preset: Istio + IstioCNI CRs on every ManagedCluster (destination.clusterName).
applicationSetNamespace: openshift-gitops
applicationSetControllerNamespace: openshift-gitops

identity:
  component: spoke-ossm

placement:
  name: acm-openshift-gitops-placement
  placementDecisionName: ""

inClusterGenerator:
  enabled: false

generatorConfigMap:
  create: false
  name: acm-gitops-placement-generator

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-spoke-ossm
  roleBindingName: openshift-gitops-ocm-placement-spoke-ossm
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

argocdApplicationControllerRbac:
  create: true
  roleName: gitops-spoke-ossm-appset-argocd-sync
  roleBindingName: gitops-spoke-ossm-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: spoke-ossm

destination:
  mode: clusterName
  namespace: istio-system

template:
  applicationNameSuffix: ossm
  ignoreDifferences:
    - group: sailoperator.io
      kind: Istio
      jsonPointers:
        - /spec/values/global/enableReaderRBAC
        - /spec/values/global/meshNetworks
  source:
    path: charts/spoke-ossm
    helm:
      releaseName: spoke-ossm
      parameters:
        - name: clusterName
          value: "{{clusterName}}"

repo:
  url: ""
  revision: main
