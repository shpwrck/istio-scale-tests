# Preset: north-south ingress gateway on every ManagedCluster (destination.clusterName).
applicationSetNamespace: openshift-gitops
applicationSetControllerNamespace: openshift-gitops

identity:
  component: spoke-ingress-gateway

placement:
  name: acm-openshift-gitops-placement
  placementDecisionName: ""

inClusterGenerator:
  enabled: false

generatorConfigMap:
  create: false
  name: acm-gitops-placement-generator

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-spoke-ingress-gw
  roleBindingName: openshift-gitops-ocm-placement-spoke-ingress-gw
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

argocdApplicationControllerRbac:
  create: true
  roleName: gitops-spoke-ingress-gateway-appset-argocd-sync
  roleBindingName: gitops-spoke-ingress-gateway-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: spoke-ingress-gateway

destination:
  mode: clusterName
  namespace: istio-system

template:
  applicationNameSuffix: ingress-gateway
  source:
    path: charts/spoke-ingress-gateway
    helm:
      releaseName: spoke-ingress-gateway
      parameters:
        - name: clusterName
          value: "{{clusterName}}"

repo:
  url: ""
  revision: main
