# Preset: east-west gateway + cross-network Gateway CR on every ManagedCluster (destination.clusterName).
applicationSetNamespace: openshift-gitops
applicationSetControllerNamespace: openshift-gitops

identity:
  component: spoke-east-west-gateway

placement:
  name: acm-openshift-gitops-placement
  placementDecisionName: ""

inClusterGenerator:
  enabled: false

generatorConfigMap:
  create: false
  name: acm-gitops-placement-generator

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-spoke-ew-gw
  roleBindingName: openshift-gitops-ocm-placement-spoke-ew-gw
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

argocdApplicationControllerRbac:
  create: true
  roleName: gitops-spoke-east-west-gateway-appset-argocd-sync
  roleBindingName: gitops-spoke-east-west-gateway-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: spoke-east-west-gateway

destination:
  mode: clusterName
  namespace: istio-system

template:
  applicationNameSuffix: east-west-gateway
  source:
    path: charts/spoke-east-west-gateway
    helm:
      releaseName: spoke-east-west-gateway
      parameters:
        - name: clusterName
          value: "{{clusterName}}"
        - name: service.type
          value: NodePort
        - name: service.nodePorts.tls
          value: "32443"

repo:
  url: ""
  revision: main
