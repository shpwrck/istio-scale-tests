apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: {{ .Values.operatorGroup.name }}
  namespace: {{ .Release.Namespace }}
spec:
  targetNamespaces:
{{- if .Values.operatorGroup.targetNamespaces }}
{{- range .Values.operatorGroup.targetNamespaces }}
    - {{ . }}
{{- end }}
{{- else }}
    - {{ .Release.Namespace }}
{{- end }}
