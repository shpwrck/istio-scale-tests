namespace: external-secrets-operator
sourceSecretsNamespace: cert-manager
spokeTargetNamespace: istio-system

clusterName: ""
clusterServer: ""

nameOverride: ""
fullnameOverride: ""

cacerts:
  enabled: true
  sourceSecretName: ""
  targetSecretName: ""
  refreshInterval: 5m

kubeconfig:
  enabled: true
  sourceSecretName: ""
  # Also drives the kubeconfig + remote-secret PushSecrets (templates 05/06).
  # Kept short: ESO marks a PushSecret Synced=True even when it pushed to only
  # a subset of its label-selected target stores, so a target dropped during a
  # reconcile (e.g. ESO restart) stays unwired until the next refresh. 5m bounds
  # that silent window; scripts/001-verify-mesh-wiring.sh asserts full wiring.
  refreshInterval: 5m

kubernetesAPI:
  serverURL: ""
  caFromConfigMap:
    enabled: true
    name: kube-root-ca.crt
    key: ca.crt

secretStoreName: ""
serviceAccountName: ""

spokeSecretStore:
  enabled: true
  name: ""
  skipCAProvider: false
  authType: token
  labels:
    hub-mesh-push-secrets/push-target: "true"

pushSecret:
  refreshInterval: 5m
  storeMatchLabels:
    hub-mesh-push-secrets/push-target: "true"

rbac:
  enabled: true
  argocd:
    namespace: openshift-gitops
    serviceAccountName: openshift-gitops-argocd-application-controller

argoSyncWaves:
  enabled: true
  rbac: -30
  secretStore: -25
  externalSecret: 0
  spokeSecretStore: 5
  pushSecret: 10
