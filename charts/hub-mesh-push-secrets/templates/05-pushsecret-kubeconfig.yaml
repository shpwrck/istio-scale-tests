{{- if and .Values.kubeconfig.enabled .Values.spokeSecretStore.enabled .Values.clusterName }}
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: {{ printf "push-kubeconfig-istio-%s" .Values.clusterName | trunc 63 | trimSuffix "-" | quote }}
  namespace: {{ .Values.namespace | quote }}
  {{- if .Values.argoSyncWaves.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoSyncWaves.pushSecret | quote }}
  {{- end }}
  labels:
    app.kubernetes.io/name: {{ include "hub-mesh-push-secrets.name" . | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/component: pushsecret-kubeconfig
spec:
  refreshInterval: {{ .Values.kubeconfig.refreshInterval | quote }}
  secretStoreRefs:
    - labelSelector:
        matchLabels:
          hub-mesh-push-secrets/cluster-name: {{ .Values.clusterName | quote }}
  selector:
    secret:
      name: {{ include "hub-mesh-push-secrets.kubeconfigSourceSecretName" . | quote }}
  data:
    - match:
        secretKey: kubeconfig
        remoteRef:
          remoteKey: {{ include "hub-mesh-push-secrets.kubeconfigSourceSecretName" . | quote }}
          property: kubeconfig
    - match:
        secretKey: bearer-token
        remoteRef:
          remoteKey: {{ include "hub-mesh-push-secrets.kubeconfigSourceSecretName" . | quote }}
          property: bearer-token
    - match:
        secretKey: ca.crt
        remoteRef:
          remoteKey: {{ include "hub-mesh-push-secrets.kubeconfigSourceSecretName" . | quote }}
          property: ca.crt
{{- end }}
