# Namespace where the PlacementDecision lives (clusterDecisionResource looks up `name` here).
applicationSetNamespace: open-cluster-management-global-set

# Namespace for each generated Application's spec.destination (Helm release scope on the hub).
applicationDestinationNamespace: openshift-gitops

# Namespace of the ApplicationSet controller ServiceAccount (RoleBinding subject).
applicationSetControllerNamespace: openshift-gitops

# PlacementDecision metadata.name in applicationSetNamespace.
placement:
  placementDecisionName: global-decision-1

generatorConfigMap:
  create: true
  name: ocm-placement-generator-hub-mesh-ca

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-hub-mesh-ca
  roleBindingName: openshift-gitops-ocm-placement-hub-mesh-ca
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

# Lets openshift-gitops-argocd-application-controller sync ApplicationSet + ConfigMap + RBAC into applicationSetNamespace.
argocdApplicationControllerRbac:
  create: true
  roleName: gitops-hub-mesh-ca-intermediate-appset-argocd-sync
  roleBindingName: gitops-hub-mesh-ca-intermediate-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: hub-mesh-ca-intermediate

repo:
  url: ""
  revision: main

intermediateChart:
  path: charts/hub-mesh-ca-intermediate
