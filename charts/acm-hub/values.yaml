operatorGroup:
  name: default
  # If empty, templates use the release namespace only.
  targetNamespaces: []

subscription:
  # metadata.name
  resourceName: acm-operator-subscription
  # spec.name — OperatorHub package
  packageName: advanced-cluster-management
  sourceNamespace: openshift-marketplace
  source: redhat-operators
  channel: release-2.16
  installPlanApproval: Automatic

multiclusterHub:
  resourceName: multiclusterhub
  disableHubSelfManagement: false
  # spec.localClusterName is normally set by istio-setup/001-acm-install-hub.sh from terraform first_cluster.cluster_name (≤34 chars).
  spec: {}
