apiVersion: v1
kind: ServiceAccount
metadata:
  name: cleanup-csv
  namespace: {{ .Values.operatorNamespace | quote }}
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ printf "%s-%s-cleanup-csv" .Release.Namespace .Release.Name | trunc 63 | trimSuffix "-" | quote }}
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: ["operators.coreos.com"]
    resources: ["clusterserviceversions"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-%s-cleanup-csv" .Release.Namespace .Release.Name | trunc 63 | trimSuffix "-" | quote }}
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ printf "%s-%s-cleanup-csv" .Release.Namespace .Release.Name | trunc 63 | trimSuffix "-" | quote }}
subjects:
  - kind: ServiceAccount
    name: cleanup-csv
    namespace: {{ .Values.operatorNamespace | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: cleanup-csv-{{ .Values.subscription.package }}
  namespace: {{ .Values.operatorNamespace | quote }}
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    {{- include "spoke-ossm-operator.labels" . | nindent 4 }}
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cleanup-csv
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: cleanup-csv
      restartPolicy: Never
      containers:
        - name: cleanup
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              PACKAGE={{ .Values.subscription.package | quote }}
              NS={{ .Values.operatorNamespace | quote }}
              echo "Cleaning up CSVs for package $PACKAGE in $NS..."
              oc get csv -n "$NS" -o name 2>/dev/null | grep "$PACKAGE" | while read csv; do
                echo "Deleting $csv..."
                oc delete "$csv" -n "$NS" --wait=false
              done
              echo "CSV cleanup complete."
