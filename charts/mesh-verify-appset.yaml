# Standalone Argo CD Application — deploys mesh-verify ApplicationSet on every spoke.
# Apply manually: oc apply -f charts/mesh-verify-appset.yaml
# Remove:         oc delete -f charts/mesh-verify-appset.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mesh-verify-appset
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: mesh-verify
    app.kubernetes.io/component: mesh-verify-appset
spec:
  project: default
  source:
    repoURL: https://github.com/shpwrck/istio-scale-tests.git
    targetRevision: main
    path: charts/gitops-hub-ocm-placement-appset
    helm:
      releaseName: gitops-mesh-verify-appset
      valueFiles:
        - values-mesh-verify.yaml
      parameters:
        - name: repo.url
          value: https://github.com/shpwrck/istio-scale-tests.git
        - name: repo.revision
          value: main
        - name: placement.name
          value: acm-openshift-gitops-placement
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
