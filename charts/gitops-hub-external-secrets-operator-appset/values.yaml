# Namespace where the PlacementDecision lives (same as charts/acm-openshift-gitops-resources Placement).
applicationSetNamespace: openshift-gitops

# Namespace for each generated Application spec.destination (OLM Subscription on each cluster).
applicationDestinationNamespace: external-secrets-operator

# Namespace of the ApplicationSet controller ServiceAccount (RoleBinding subject).
applicationSetControllerNamespace: openshift-gitops

placement:
  name: acm-openshift-gitops-placement
  placementDecisionName: ""

# Second generator: static hub entry — Argo in-cluster registration name (Placement excludes the hub ManagedCluster via RHACM label local-cluster=true).
inClusterGenerator:
  enabled: true
  clusterName: in-cluster

generatorConfigMap:
  create: false
  name: acm-gitops-placement-generator

clusterDecisionResource:
  requeueAfterSeconds: 30

placementRbac:
  create: true
  roleName: openshift-gitops-ocm-placement-hub-external-secrets
  roleBindingName: openshift-gitops-ocm-placement-hub-external-secrets
  applicationSetServiceAccountName: openshift-gitops-applicationset-controller

# Lets openshift-gitops-argocd-application-controller sync ApplicationSet + ConfigMap + RBAC into applicationSetNamespace.
argocdApplicationControllerRbac:
  create: true
  roleName: gitops-hub-external-secrets-operator-appset-argocd-sync
  roleBindingName: gitops-hub-external-secrets-operator-appset-argocd-sync
  serviceAccountName: openshift-gitops-argocd-application-controller
  serviceAccountNamespace: openshift-gitops

applicationSet:
  name: hub-external-secrets-operator

repo:
  url: ""
  revision: main

externalSecretsChart:
  path: charts/external-secrets-operator
