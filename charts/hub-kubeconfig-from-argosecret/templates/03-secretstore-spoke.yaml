{{- if and .Values.spokeSecretStore.enabled .Values.clusterServer .Values.clusterName }}
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ include "hub-kubeconfig-from-argosecret.spokeSecretStoreName" . | quote }}
  namespace: {{ .Values.namespace | quote }}
  {{- if .Values.argoSyncWaves.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoSyncWaves.spokeSecretStore | quote }}
  {{- end }}
  labels:
    app.kubernetes.io/name: {{ include "hub-kubeconfig-from-argosecret.name" . | quote }}
    app.kubernetes.io/instance: {{ .Release.Name | quote }}
    app.kubernetes.io/component: spoke-secretstore
    {{- with .Values.spokeSecretStore.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  provider:
    kubernetes:
{{- with .Values.spokeSecretStore.remoteNamespace }}
      remoteNamespace: {{ . | quote }}
{{- end }}
      server:
        url: {{ .Values.clusterServer | quote }}
{{- if not .Values.spokeSecretStore.skipCAProvider }}
        caProvider:
          type: Secret
          name: {{ include "hub-kubeconfig-from-argosecret.targetSecretName" . | quote }}
          key: ca.crt
{{- end }}
      auth:
{{- if eq (default "token" .Values.spokeSecretStore.authType) "cert" }}
        cert:
          clientCert:
            name: {{ include "hub-kubeconfig-from-argosecret.targetSecretName" . | quote }}
            key: client-cert
          clientKey:
            name: {{ include "hub-kubeconfig-from-argosecret.targetSecretName" . | quote }}
            key: client-key
{{- else }}
        token:
          bearerToken:
            name: {{ include "hub-kubeconfig-from-argosecret.targetSecretName" . | quote }}
            key: bearer-token
{{- end }}
{{- end }}
