# Namespace for SecretStore, ExternalSecret, kubeconfig output Secret, and store ServiceAccount.
# The Red Hat External Secrets operand reconciles namespaced CRs in this namespace (default) — not openshift-gitops.
namespace: external-secrets-operator

# Namespace that holds ACM/GitOps Argo cluster Secrets.
sourceSecretsNamespace: openshift-gitops

# ManagedCluster name matching the Argo cluster secret (for spokes e.g. cluster-002; for hub list entry use the hub ManagedCluster name e.g. cluster-001, not in-cluster).
clusterName: ""

# Spoke cluster API server URL, injected by the ApplicationSet generator.
clusterServer: ""

nameOverride: ""
fullnameOverride: ""

# ManagedServiceAccount name used to construct the default source secret name.
# The ACM gitops-addon creates cluster secrets as {clusterName}-{managedServiceAccountName}-cluster-secret.
managedServiceAccountName: application-manager

# Source Argo cluster Secret name; default {clusterName}-{managedServiceAccountName}-cluster-secret.
sourceSecretName: ""

# Target Secret name holding key kubeconfig; default kubeconfig-{clusterName}.
targetSecretName: ""

refreshInterval: 1h

# In-cluster Kubernetes API client settings for the kubernetes provider (SecretStore validation + fetches).
# Set caFromConfigMap.enabled to false only if the apiserver uses a public CA and validation succeeds without it.
kubernetesAPI:
  # Optional override; empty uses ESO default (kubernetes.default.svc).
  serverURL: ""
  caFromConfigMap:
    enabled: true
    name: kube-root-ca.crt
    key: ca.crt

secretStoreName: ""

spokeSecretStore:
  enabled: true
  name: ""
  remoteNamespace: ""
  # Skip caProvider when spoke API uses a publicly-trusted CA (e.g. Let's Encrypt on ROSA HCP).
  skipCAProvider: false
  # Auth type for the spoke SecretStore: "token" (bearer token) or "cert" (client certificate).
  authType: token
  labels:
    hub-kubeconfig-from-argosecret/push-target: "true"

pushSecret:
  enabled: true
  refreshInterval: 1h
  storeMatchLabels:
    hub-kubeconfig-from-argosecret/push-target: "true"

serviceAccountName: ""

# Grant openshift-gitops-argocd-application-controller permission to reconcile ESO CRs and target Secret.
rbac:
  enabled: true
  argocd:
    namespace: openshift-gitops
    serviceAccountName: openshift-gitops-argocd-application-controller
  labels: {}
  annotations: {}

argoSyncWaves:
  enabled: true
  rbac: -30
  secretStore: -25
  externalSecret: 0
  spokeSecretStore: 5
  pushSecret: 10
