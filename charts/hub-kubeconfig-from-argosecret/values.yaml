# Namespace where Argo CD + ACM cluster Secrets live (same as SecretStore and target Secret).
namespace: openshift-gitops

# ManagedCluster name matching the Argo cluster secret (for spokes e.g. rosa-002; for hub list entry use the hub ManagedCluster name e.g. rosa-001, not in-cluster).
clusterName: ""

nameOverride: ""
fullnameOverride: ""

# Source Argo cluster Secret name; default {clusterName}-application-manager-cluster-secret.
sourceSecretName: ""

# Target Secret name holding key kubeconfig; default kubeconfig-{clusterName}.
targetSecretName: ""

refreshInterval: 1h

# In-cluster Kubernetes API client settings for the kubernetes provider (SecretStore validation + fetches).
# Set caFromConfigMap.enabled to false only if the apiserver uses a public CA and validation succeeds without it.
kubernetesAPI:
  # Optional override; empty uses ESO default (kubernetes.default.svc).
  serverURL: ""
  caFromConfigMap:
    enabled: true
    name: kube-root-ca.crt
    key: ca.crt

secretStoreName: ""

serviceAccountName: ""

# Grant openshift-gitops-argocd-application-controller permission to reconcile ESO CRs and target Secret.
rbac:
  enabled: true
  argocd:
    namespace: openshift-gitops
    serviceAccountName: openshift-gitops-argocd-application-controller
  labels: {}
  annotations: {}

argoSyncWaves:
  enabled: true
  rbac: -30
  secretStore: -25
  externalSecret: 0
