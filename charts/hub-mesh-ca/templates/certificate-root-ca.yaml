{{- if .Values.rootCA.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.rootCA.certificateName | quote }}
  namespace: {{ .Values.namespace | quote }}
  {{- if .Values.argoSyncWaves.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoSyncWaves.rootCertificate | quote }}
  {{- end }}
spec:
  isCA: true
  commonName: {{ .Values.rootCA.commonName | quote }}
  duration: {{ .Values.rootCA.duration | quote }}
  secretName: {{ .Values.rootCA.secretName | quote }}
  subject:
    organizations:
      - {{ .Values.rootCA.organization | quote }}
  privateKey:
    algorithm: {{ .Values.rootCA.privateKey.algorithm | quote }}
    size: {{ .Values.rootCA.privateKey.size }}
  issuerRef:
    name: {{ .Values.bootstrapIssuer.name | quote }}
    kind: ClusterIssuer
{{- end }}
