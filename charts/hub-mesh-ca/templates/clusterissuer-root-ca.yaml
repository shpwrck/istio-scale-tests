{{- if and .Values.rootClusterIssuer.enabled .Values.rootCA.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.rootCA.clusterIssuerName | quote }}
  {{- if .Values.argoSyncWaves.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoSyncWaves.rootClusterIssuer | quote }}
  {{- end }}
spec:
  ca:
    secretName: {{ .Values.rootCA.secretName | quote }}
{{- end }}
