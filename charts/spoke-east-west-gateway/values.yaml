clusterName: ""
networkSuffix: network
meshID: mesh1

# Fixed replica count used when autoscaling.enabled=false (the scale-test default).
# Pinned at 1: deterministic (never autoscales mid-measurement, which would confound
# data-plane/churn-dataplane results) and minimal-footprint. Raise for higher-
# throughput sweeps if a single gateway pod becomes the bottleneck.
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 2000m
    memory: 1024Mi

autoscaling:
  # PINNED for scale tests: HPA OFF so the gateway holds a fixed replicaCount and
  # does not autoscale mid-measurement (worker pools + istiod are pinned the same
  # way). Set enabled=true to restore the HPA (min/max/target below) for non-test use.
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

service:
  # LoadBalancer is required for cross-cluster east-west traffic on ROSA/AWS
  # (multi-VPC, peering off): workers have no external IPs, so a NodePort is not
  # reachable across clusters; a public NLB is. (Commit 235ea6d had set NodePort
  # for a MetalLB homelab whose flat 172.16.x network made NodePort routable —
  # that environment no longer points at this repo.) The nodePort below is still
  # pinned: a LoadBalancer Service allocates nodePorts too, and pinning keeps the
  # value stable across re-applies; it is harmless when type=LoadBalancer.
  type: LoadBalancer
  annotations: {}
  nodePorts:
    tls: "31443"

argoSyncWaves:
  enabled: true
  rbac: "-30"
  gateway: "0"
  exposeServices: "5"

rbac:
  enabled: true
  argocd:
    namespace: openshift-gitops
    serviceAccountName: openshift-gitops-argocd-application-controller
