apiVersion: v1
kind: ServiceAccount
metadata:
  name: istio-ingressgateway
  namespace: istio-system
  {{- if .Values.argoSyncWaves.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoSyncWaves.gateway | quote }}
  {{- end }}
  labels:
    {{- include "spoke-ingress-gateway.labels" . | nindent 4 }}
