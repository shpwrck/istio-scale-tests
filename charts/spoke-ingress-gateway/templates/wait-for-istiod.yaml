apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-for-istiod
  namespace: istio-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wait-for-istiod
  namespace: istio-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wait-for-istiod
  namespace: istio-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wait-for-istiod
subjects:
  - kind: ServiceAccount
    name: wait-for-istiod
    namespace: istio-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-istiod-{{ now | date "20060102-150405" }}
  namespace: istio-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    {{- include "spoke-ingress-gateway.labels" . | nindent 4 }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-istiod
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: wait-for-istiod
      restartPolicy: Never
      containers:
        - name: wait
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "Waiting for istiod deployment to be available..."
              ELAPSED=0
              while [ $ELAPSED -lt 600 ]; do
                AVAIL=$(oc get deployment istiod -n istio-system -o jsonpath='{.status.availableReplicas}' 2>/dev/null || echo "0")
                if [ "${AVAIL:-0}" -ge 1 ]; then
                  echo "istiod is available (${AVAIL} replicas). Gateway sync can proceed."
                  exit 0
                fi
                echo "istiod not yet available (elapsed ${ELAPSED}s)..."
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "ERROR: istiod not available after 600s"
              exit 1
