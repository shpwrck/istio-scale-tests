apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-istiod-ingress-{{ now | date "20060102-150405" }}
  namespace: istio-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    {{- include "spoke-ingress-gateway.labels" . | nindent 4 }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-istiod-ingress
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      containers:
        - name: wait
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              echo "Waiting for istiod to be ready..."
              ELAPSED=0
              while [ $ELAPSED -lt 600 ]; do
                if curl -sf http://istiod.istio-system.svc:15014/version >/dev/null 2>&1; then
                  echo "istiod is ready. Gateway sync can proceed."
                  exit 0
                fi
                echo "istiod not yet ready (elapsed ${ELAPSED}s)..."
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "ERROR: istiod not ready after 600s"
              exit 1
