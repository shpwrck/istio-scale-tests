apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-for-istiod-ingress
  namespace: istio-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wait-for-istiod-ingress
  namespace: istio-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wait-for-istiod-ingress
  namespace: istio-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wait-for-istiod-ingress
subjects:
  - kind: ServiceAccount
    name: wait-for-istiod-ingress
    namespace: istio-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-istiod-ingress-{{ now | date "20060102-150405" }}
  namespace: istio-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
  labels:
    {{- include "spoke-ingress-gateway.labels" . | nindent 4 }}
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wait-for-istiod-ingress
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: wait-for-istiod-ingress
      restartPolicy: Never
      containers:
        - name: wait
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              APISERVER=https://kubernetes.default.svc
              TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
              CACERT=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              URL="$APISERVER/apis/apps/v1/namespaces/istio-system/deployments/istiod"
              echo "Waiting for istiod deployment to be available..."
              ELAPSED=0
              while [ $ELAPSED -lt 600 ]; do
                AVAIL=$(curl -s --cacert "$CACERT" -H "Authorization: Bearer $TOKEN" "$URL" | grep -o '"availableReplicas":[0-9]*' | cut -d: -f2)
                if [ "${AVAIL:-0}" -ge 1 ] 2>/dev/null; then
                  echo "istiod is available (${AVAIL} replicas). Gateway sync can proceed."
                  exit 0
                fi
                echo "istiod not yet available (elapsed ${ELAPSED}s)..."
                sleep 10
                ELAPSED=$((ELAPSED + 10))
              done
              echo "ERROR: istiod not available after 600s"
              exit 1
