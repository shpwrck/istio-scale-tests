clusterName: ""
networkSuffix: network
platform: openshift

# Fixed replica count used when autoscaling.enabled=false (the scale-test default).
# Pinned at 1: deterministic (never autoscales mid-measurement, which would confound
# data-plane/churn-dataplane results) and minimal-footprint. Raise for higher-
# throughput sweeps if a single gateway pod becomes the bottleneck.
replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 2000m
    memory: 1024Mi

autoscaling:
  # PINNED for scale tests: HPA OFF so the gateway holds a fixed replicaCount and
  # does not autoscale mid-measurement (worker pools + istiod are pinned the same
  # way). Set enabled=true to restore the HPA (min/max/target below) for non-test use.
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

service:
  type: LoadBalancer
  annotations: {}

argoSyncWaves:
  enabled: true
  rbac: "-30"
  gateway: "0"

rbac:
  enabled: true
  argocd:
    namespace: openshift-gitops
    serviceAccountName: openshift-gitops-argocd-application-controller
