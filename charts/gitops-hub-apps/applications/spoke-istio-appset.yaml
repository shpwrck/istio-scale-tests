# Argo CD Application — ApplicationSet that installs Istio and IstioCNI CRs (Sail operator) on every spoke cluster via ACM Placement.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spoke-istio-appset
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  labels:
    app.kubernetes.io/name: gitops-hub-apps
    app.kubernetes.io/component: spoke-istio-appset
spec:
  project: default
  source:
    repoURL: https://github.com/shpwrck/istio-scale-tests.git
    targetRevision: main
    path: charts/gitops-hub-ocm-placement-appset
    helm:
      releaseName: gitops-spoke-istio-appset
      valueFiles:
        - values-istio.yaml
      parameters:
        - name: repo.url
          value: https://github.com/shpwrck/istio-scale-tests.git
        - name: repo.revision
          value: main
        - name: placement.name
          value: acm-openshift-gitops-placement
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
