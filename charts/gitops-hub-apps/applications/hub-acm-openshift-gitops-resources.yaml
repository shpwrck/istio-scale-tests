# Argo CD Application — RHACM ManagedClusterSetBinding + Placement (+ shared ApplicationSet placement ConfigMap when argoServer.cluster is set).
# Same repo URL requirement as sibling manifests — fork URLs must match terraform var.gitops_app_repo_url.
# Note: the per-spoke Argo CD cluster secrets are created and owned by Terraform (create-argocd-cluster-secret.sh), not by a GitOpsCluster.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-acm-openshift-gitops-resources
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: gitops-hub-apps
    app.kubernetes.io/component: acm-openshift-gitops-resources
spec:
  project: default
  source:
    repoURL: https://github.com/shpwrck/istio-scale-tests.git
    targetRevision: main
    path: charts/acm-openshift-gitops-resources
    helm:
      releaseName: acm-openshift-gitops-resources
      parameters:
        - name: gitopsNamespace
          value: openshift-gitops
        - name: clusterSet
          value: istio-scale-tests
        - name: placement.name
          value: acm-openshift-gitops-placement
        # Left empty on purpose: Terraform creates the placement-generator ConfigMap itself
        # (kubernetes_manifest.placement_generator_configmap) after the cluster secrets exist.
        - name: argoServer.cluster
          value: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
