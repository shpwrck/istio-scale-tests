# Argo CD Application — ApplicationSet that pushes cacerts and kubeconfigs to istio-system on every spoke cluster via External Secrets PushSecret.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-mesh-push-secrets-appset
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "19"
  labels:
    app.kubernetes.io/name: gitops-hub-apps
    app.kubernetes.io/component: hub-mesh-push-secrets-appset
spec:
  project: default
  source:
    repoURL: https://github.com/shpwrck/istio-scale-tests.git
    targetRevision: main
    path: charts/gitops-hub-ocm-placement-appset
    helm:
      releaseName: gitops-hub-mesh-push-secrets-appset
      valueFiles:
        - values-mesh-push-secrets.yaml
      parameters:
        - name: repo.url
          value: https://github.com/shpwrck/istio-scale-tests.git
        - name: repo.revision
          value: main
        - name: placement.name
          value: acm-openshift-gitops-placement
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
