# Argo CD Application — ApplicationSet that creates one hub-mesh-ca-intermediate Application per PlacementDecision cluster (clusterDecisionResource).
# Same repo URL requirement as sibling manifests. Requires repo.url when installing the Helm chart (match GITOPS_APP_REPO_URL / fork).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-mesh-ca-intermediate-appset
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "15"
  labels:
    app.kubernetes.io/name: gitops-hub-apps
    app.kubernetes.io/component: hub-mesh-ca-intermediate-appset
spec:
  project: default
  source:
    repoURL: https://github.com/shpwrck/istio-scale-tests.git
    targetRevision: main
    path: charts/gitops-hub-mesh-ca-intermediate-appset
    helm:
      releaseName: gitops-hub-mesh-ca-intermediate-appset
      parameters:
        - name: repo.url
          value: https://github.com/shpwrck/istio-scale-tests.git
        - name: repo.revision
          value: main
        - name: placement.placementDecisionName
          value: acm-openshift-gitops-placement-decision-1
  destination:
    server: https://kubernetes.default.svc
    # Must match PlacementDecision namespace (same as charts/acm-openshift-gitops-resources Placement).
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
