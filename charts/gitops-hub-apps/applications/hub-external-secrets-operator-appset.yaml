# Argo CD Application — installs external-secrets-operator on the hub (in-cluster) only.
# The hub ESO instance pushes secrets to spoke clusters via PushSecret resources.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-external-secrets-operator
  namespace: openshift-gitops
  annotations:
    # After hub-mesh-ca (5); before hub-mesh-ca-intermediate-appset (15): operator available before secrets are pushed.
    argocd.argoproj.io/sync-wave: "12"
  labels:
    app.kubernetes.io/name: gitops-hub-apps
    app.kubernetes.io/component: hub-external-secrets-operator
spec:
  project: default
  source:
    repoURL: https://github.com/shpwrck/istio-scale-tests.git
    targetRevision: main
    path: charts/external-secrets-operator
    helm:
      releaseName: external-secrets-operator-olm
  destination:
    name: in-cluster
    namespace: external-secrets-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
