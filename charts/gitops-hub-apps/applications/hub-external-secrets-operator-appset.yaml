# Argo CD Application — ApplicationSet that creates one external-secrets-operator Application per PlacementDecision cluster (clusterDecisionResource) plus in-cluster.
# Same repo URL requirement as sibling manifests. Requires repo.url when installing the Helm chart (match GITOPS_APP_REPO_URL / fork).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-external-secrets-operator-appset
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "17"
  labels:
    app.kubernetes.io/name: gitops-hub-apps
    app.kubernetes.io/component: hub-external-secrets-operator-appset
spec:
  project: default
  source:
    repoURL: https://github.com/shpwrck/istio-scale-tests.git
    targetRevision: main
    path: charts/gitops-hub-external-secrets-operator-appset
    helm:
      releaseName: gitops-hub-external-secrets-operator-appset
      parameters:
        - name: repo.url
          value: https://github.com/shpwrck/istio-scale-tests.git
        - name: repo.revision
          value: main
        - name: placement.name
          value: acm-openshift-gitops-placement
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
