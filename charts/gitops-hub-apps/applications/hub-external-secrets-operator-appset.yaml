# Argo CD Application — ApplicationSet that generates a single external-secrets-operator Application for in-cluster (hub only).
# The hub ESO instance pushes secrets to spoke clusters via PushSecret resources.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-external-secrets-operator-appset
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # After hub-mesh-ca (5); before hub-mesh-ca-intermediate-appset (15): operator available before secrets are pushed.
    argocd.argoproj.io/sync-wave: "12"
  labels:
    app.kubernetes.io/name: gitops-hub-apps
    app.kubernetes.io/component: hub-external-secrets-operator-appset
spec:
  project: default
  source:
    repoURL: https://github.com/shpwrck/istio-scale-tests.git
    targetRevision: main
    path: charts/gitops-hub-ocm-placement-appset
    helm:
      releaseName: gitops-hub-external-secrets-operator-appset
      valueFiles:
        - values-external-secrets.yaml
      parameters:
        - name: repo.url
          value: https://github.com/shpwrck/istio-scale-tests.git
        - name: repo.revision
          value: main
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
