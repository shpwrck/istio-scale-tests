# Argo CD Application — ApplicationSet that creates one hub-kubeconfig-from-argosecret Helm release per Placement cluster + hub list entry (in openshift-gitops).
# Requires External Secrets operator on the hub (hub-external-secrets-operator-appset). Match spec.source.repoURL to hub-gitops-root / GITOPS_APP_REPO_URL.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hub-kubeconfig-from-argosecret-appset
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "18"
  labels:
    app.kubernetes.io/name: gitops-hub-apps
    app.kubernetes.io/component: hub-kubeconfig-from-argosecret-appset
spec:
  project: default
  source:
    repoURL: https://github.com/shpwrck/istio-scale-tests.git
    targetRevision: main
    path: charts/gitops-hub-ocm-placement-appset
    helm:
      releaseName: gitops-hub-kubeconfig-from-argosecret-appset
      valueFiles:
        - values-kubeconfig-from-argosecret.yaml
      parameters:
        - name: repo.url
          value: https://github.com/shpwrck/istio-scale-tests.git
        - name: repo.revision
          value: main
        - name: placement.name
          value: acm-openshift-gitops-placement
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
