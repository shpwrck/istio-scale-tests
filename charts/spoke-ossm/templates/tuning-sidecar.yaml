{{- if .Values.tuningBaseline.sidecar.enabled }}
{{- /*
  Campaign baseline — Profile 01 (sidecar-scoping), baked in.

  A mesh-wide Sidecar CR in the root namespace (istio-system) restricts every
  proxy's egress view. This is istiod's primary scaling lever: without it each
  proxy receives config for every Service in the mesh and per-proxy config grows
  O(services x sidecars).

  WHY NOT "./*"-only (the runtime profile's default):
    tests/tuning/profiles/01-sidecar-scoping.yaml ships
    egress.hosts: ["./*", "istio-system/*"] — local-namespace-only. For the
    20-cluster / 10k-service campaign that is WRONG: each suite's workloads talk
    cross-namespace (and cross-cluster via the east-west gateway) to the other
    suites' Services, so collapsing every proxy to its own namespace understates
    per-proxy config and defeats a realistic-scale run. The default egress graph
    (values.yaml tuningBaseline.sidecar.egressHosts) spans istio-system plus the
    five suite namespaces; it is values-driven so an operator can widen/narrow it.
*/}}
apiVersion: networking.istio.io/v1
kind: Sidecar
metadata:
  name: default
  namespace: istio-system
  labels:
    {{- include "spoke-ossm.labels" . | nindent 4 }}
  {{- if .Values.argoSyncWaves.enabled }}
  annotations:
    argocd.argoproj.io/sync-wave: {{ .Values.argoSyncWaves.tuning | quote }}
  {{- end }}
spec:
  egress:
    - hosts:
        {{- range $h := .Values.tuningBaseline.sidecar.egressHosts }}
        - {{ $h | quote }}
        {{- end }}
{{- end }}
