clusterName: ""
meshID: mesh1
networkSuffix: network
istioVersion: v1.28.5

# istiod (pilot) control-plane topology + sizing.
# For scale testing we pin a FIXED replica count (operator HPA disabled) so the
# per-pod metric fanout in tests/lib/fanout.sh aggregates over a stable topology,
# and bump resources so the fixed fleet comfortably carries the full multi-cluster
# xDS load without OOM/CPU-throttling. Set autoscaleEnabled: true to restore the
# operator's default HorizontalPodAutoscaler (min 1, max 5, 80% CPU).
# GOMEMLIMIT is auto-derived by the istiod chart from limits.memory — do NOT set it manually.
#
# Sized for the 20-cluster / 10,000-service (mesh-wide) campaign. In multi-primary
# every istiod caches ALL remote services/endpoints, so memory scales with the
# WHOLE mesh, not the local cluster — istiod scales vertically, not horizontally
# (extra replicas only distribute connected proxies, they do NOT shrink the cache).
# 8Gi was sized for ~500-2000-pod meshes; 10k services / ~30k endpoints needs more.
pilot:
  autoscaleEnabled: false
  replicaCount: 5
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 16Gi

# Sidecar proxy (data-plane) resources. The OSSM/Istio default request is cpu: 10m,
# which is NOT production-representative and causes proxy CPU throttling under load.
# This is the production baseline (tuning profile 05-proxy-resources). It is also the
# value that sizes the worker fleet: at 100m/proxy, the 30k injected proxies in the
# 20c/10k campaign require ~3,000 vCPU of worker capacity.
proxy:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

accessLogFile: /dev/stdout
accessLogEncoding: JSON

meshNetworks: {}

# ---------------------------------------------------------------------------
# Campaign tuning baseline (supported-only Tier-1/2 profiles baked in)
#
# These mirror the runtime tuning *profiles* under tests/tuning/profiles/ but
# bake the four SUPPORTED levers (01 sidecar-scoping, 02 discovery-selectors,
# 07 telemetry-filtering, 08 access-log-filtering) into the mesh baseline so the
# 20-cluster / 10k-service campaign comes up production-configured rather than
# wide-open. Each lever is individually toggleable; the runtime profiles remain
# the A/B sweep mechanism and are NOT replaced by this.
# ---------------------------------------------------------------------------
tuningBaseline:
  # Profile 02 — discoverySelectors. When enabled, istiod only watches
  # namespaces that match one of the selectors below; every other namespace is
  # invisible to the control plane (no informers, no config, no push).
  #
  # CRITICAL coverage note: discoverySelectors makes istiod ignore ANY namespace
  # that matches NONE of the selectors — INCLUDING its own root namespace
  # (istio-system) and the east-west / ingress gateways, which all live in
  # istio-system on this stack. Dropping istio-system would strip the gateway
  # config and the root-namespace Sidecar (below), breaking cross-cluster
  # traffic. Istio does NOT auto-include its own namespace under
  # discoverySelectors. We therefore OR two selectors:
  #   1. istio-discovery=enabled   — the test-workload namespaces (labelled by
  #      each suite's namespace.yaml template).
  #   2. kubernetes.io/metadata.name=istio-system — the immutable label every
  #      namespace carries (NamespaceDefaultLabelName, GA since k8s 1.21), so we
  #      guarantee istio-system is discovered WITHOUT mutating the
  #      operator-owned istio-system namespace from this chart.
  # Selectors are OR'd: a namespace is watched if it matches ANY entry.
  discoverySelectors:
    enabled: true
    selectors:
      - matchLabels:
          istio-discovery: "enabled"
      - matchLabels:
          kubernetes.io/metadata.name: istio-system

  # Profile 01 — root-namespace Sidecar scoping. A mesh-wide Sidecar CR in
  # istio-system restricts every proxy's egress view, the primary istiod
  # scaling lever (per-proxy config grows O(services x sidecars) without it).
  sidecar:
    enabled: true
    # CRITICAL: the runtime profile ships egress.hosts = ["./*","istio-system/*"]
    # (local-namespace-only). That is WRONG for this campaign: at 20c/10k the
    # workloads in each suite's namespace talk CROSS-namespace (and cross-cluster
    # via the east-west gateway) to the other suites' Services. Collapsing every
    # proxy to "./*" understates per-proxy config and defeats the whole point of
    # a realistic-scale run. The default below is the real cross-namespace graph:
    # istio-system (gateways + control plane) plus the suite + mesh-verify
    # namespaces. Operators can widen/narrow this list; "./*" keeps in-namespace
    # traffic. NOTE: this root Sidecar applies to the SIDECAR proxies only — the
    # injected ingress/east-west gateways are exempted to "*/*" by the
    # workloadSelector Sidecars in templates/tuning-sidecar.yaml (severance trap).
    #
    # !!! LOUD WARNING — egressHosts namespace parts are EXACT matches, NOT globs.
    # An Istio Sidecar egress host of the form "<namespace>/<dnsName>" matches the
    # namespace part EXACTLY; "controlplane-test/*" does NOT cover
    # "controlplane-test-0/*". So when controlplane.namespaceCount > 1 the suite
    # mints controlplane-test-0, controlplane-test-1, … and the bare
    # "controlplane-test/*" entry below is DEAD (unused) for those workloads — you
    # MUST add an explicit "controlplane-test-<i>/*" entry for each extra namespace
    # or those proxies lose egress to the controlplane workloads. (Harmless at the
    # default namespaceCount=1, where controlplane lands only in its primary
    # namespace.) See tests/tuning/README.md "Campaign baseline" + "Adding a new
    # mesh namespace".
    #
    # Adding a NEW mesh namespace requires TWO steps (see README checklist):
    #   (a) label the namespace istio-discovery=enabled (else discoverySelectors
    #       hide it from istiod entirely), and
    #   (b) add "<ns>/*" here (else its sidecars cannot egress to it).
    egressHosts:
      - "./*"
      - "istio-system/*"
      - "mesh-verify/*"
      - "churn-test/*"
      - "churn-dataplane-test/*"
      - "controlplane-test/*"
      - "dataplane-test/*"
      - "propagation-test/*"

  # Profile 07 — telemetry filtering. Disable CLIENT-side request metrics to cut
  # metric volume ~40-50% (server-side metrics retained).
  telemetryFiltering:
    enabled: true

  # Profile 08 — access-log filtering. Log only server-side error responses
  # (HTTP >= 400) via the Telemetry API; client-side access logging off.
  accessLogFiltering:
    enabled: true

argoSyncWaves:
  enabled: true
  rbac: "-30"
  istioCni: "0"
  istio: "5"
  # Sidecar + Telemetry CRs sync AFTER the Istio CR so istiod (and its CRDs)
  # exist before the campaign tuning resources are applied.
  tuning: "10"

rbac:
  enabled: true
  argocd:
    namespace: openshift-gitops
    serviceAccountName: openshift-gitops-argocd-application-controller
